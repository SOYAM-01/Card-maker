<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Special+Elite&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { background: #f8fafc; font-family: sans-serif; }
    .card-font { font-family: 'Playfair Display', serif; }
    .card-font-special { font-family: 'Special Elite', cursive; }
    .custom-card {
      border-radius: 20px;
      transition: width 0.3s ease, height 0.3s ease;
    }
    #captureArea {
      width: 260px;
      height: 360px;
    }
    #captureArea.horizontal {
      width: 380px;
      height: 230px;
    }
    .theme-btn { transition: transform 0.15s; }
    .theme-btn:hover { transform: scale(1.2); }
    .layout-btn { transition: all 0.2s; }
    .layout-btn.active { background: #1e293b; color: white; }

    /* Auto-fit text inside card */
    #captureArea {
      overflow: hidden;
    }
    #displayTxt {
      display: block;
      width: 100%;
      word-break: break-word;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">
  <div class="w-full max-w-lg bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
    <h2 class="text-xl font-bold text-center text-slate-800 mb-6">Card Creator ✨</h2>

    <textarea id="textInp"
      class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 transition-all text-gray-700"
      placeholder="Apna message yahan likhein..."
      rows="4"></textarea>

    <div class="grid grid-cols-2 gap-4 mt-4">
      <!-- Layout -->
      <div>
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Format</label>
        <div class="flex gap-2">
          <button id="btnV" onclick="setLayout('V')"
            class="layout-btn active flex-1 py-2 rounded-lg text-sm font-semibold border border-slate-200 bg-slate-900 text-white">
            ▯ Vertical
          </button>
          <button id="btnH" onclick="setLayout('H')"
            class="layout-btn flex-1 py-2 rounded-lg text-sm font-semibold border border-slate-200 bg-slate-50 text-slate-700">
            ▭ Horizontal
          </button>
        </div>
      </div>

      <!-- Theme -->
      <div>
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Color Theme</label>
        <div class="flex gap-2 mt-1 flex-wrap">
          <button onclick="setTheme('#ffffff','#1e293b','#e2e8f0')" title="White"
            class="theme-btn w-7 h-7 rounded-full bg-white border-2 border-slate-300"></button>
          <button onclick="setTheme('#fef2f2','#991b1b','#fecaca')" title="Red"
            class="theme-btn w-7 h-7 rounded-full bg-red-50 border-2 border-red-200"></button>
          <button onclick="setTheme('#f0f9ff','#075985','#bae6fd')" title="Sky"
            class="theme-btn w-7 h-7 rounded-full bg-sky-100 border-2 border-sky-300"></button>
          <button onclick="setTheme('#1e293b','#f8fafc','#475569')" title="Dark"
            class="theme-btn w-7 h-7 rounded-full bg-slate-800 border-2 border-slate-600"></button>
          <button onclick="setTheme('#fefce8','#854d0e','#fde68a')" title="Yellow"
            class="theme-btn w-7 h-7 rounded-full bg-yellow-50 border-2 border-yellow-300"></button>
          <button onclick="setTheme('#f0fdf4','#166534','#bbf7d0')" title="Green"
            class="theme-btn w-7 h-7 rounded-full bg-green-50 border-2 border-green-300"></button>
        </div>
      </div>
    </div>

    <!-- Font Picker -->
    <div class="mt-4">
      <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Font Style</label>
      <div class="flex gap-2">
        <button id="btnPlayfair" onclick="setFont('playfair')"
          class="font-btn active flex-1 py-2 rounded-lg text-sm font-semibold border border-slate-200 bg-slate-900 text-white"
          style="font-family:'Playfair Display',serif;">Playfair</button>
        <button id="btnSpecial" onclick="setFont('special')"
          class="font-btn flex-1 py-2 rounded-lg text-sm font-semibold border border-slate-200 bg-slate-50 text-slate-700"
          style="font-family:'Special Elite',cursive;">Special Elite</button>
      </div>
    </div>
    <!-- Random Layout Button -->
    <div class="mt-4">
      <button onclick="randomLayout()"
        class="w-full py-2 rounded-xl text-sm font-bold border-2 border-dashed border-purple-300 bg-purple-50 text-purple-700 hover:bg-purple-100 active:scale-95 transition-all">
        🎲 Random Layout
      </button>
    </div>

    <div class="flex flex-col items-center py-8 bg-slate-50 rounded-2xl mt-6 border-2 border-dashed border-slate-200 overflow-auto">
      <div id="captureArea"
        class="custom-card relative bg-white flex items-center justify-center text-center border-[8px] border-slate-200"
        style="padding: 2rem;">
        <p id="displayTxt" class="card-font text-xl text-slate-800 leading-snug break-words w-full">Apna Text</p>
      </div>
    </div>

    <!-- Download Button -->
    <button onclick="downloadImage()"
      class="w-full mt-6 py-4 bg-slate-900 text-white rounded-xl font-bold shadow-lg active:scale-95 transition-all hover:bg-slate-700">
      Download Card 📥
    </button>

    <p id="statusMsg" class="hidden mt-3 text-center text-xs text-green-600 font-semibold">
      ✅ Image downloaded successfully!
    </p>
  </div>

  <script>
    const textInp = document.getElementById('textInp');
    const displayTxt = document.getElementById('displayTxt');
    const card = document.getElementById('captureArea');
    const statusMsg = document.getElementById('statusMsg');

    // Auto-fit font size so text never overflows the card
    function autoFitText() {
      const padding = 64; // 2rem padding on each side = ~32px x2
      const borderWidth = 16; // 8px border x2
      const maxWidth = card.offsetWidth - padding - borderWidth;
      const maxHeight = card.offsetHeight - padding - borderWidth;

      let fontSize = 22; // start size in px
      const minFontSize = 9;

      displayTxt.style.fontSize = fontSize + 'px';

      // Shrink font until text fits within card bounds
      while (
        (displayTxt.scrollHeight > maxHeight || displayTxt.scrollWidth > maxWidth) &&
        fontSize > minFontSize
      ) {
        fontSize -= 0.5;
        displayTxt.style.fontSize = fontSize + 'px';
      }
    }

    // Live preview
    textInp.addEventListener('input', (e) => {
      displayTxt.innerText = e.target.value || "Apna Text";
      statusMsg.classList.add('hidden');
      autoFitText();
    });

    function setFont(val) {
      const btnP = document.getElementById('btnPlayfair');
      const btnS = document.getElementById('btnSpecial');
      if (val === 'special') {
        displayTxt.classList.remove('card-font');
        displayTxt.classList.add('card-font-special');
        btnS.classList.add('bg-slate-900', 'text-white');
        btnS.classList.remove('bg-slate-50', 'text-slate-700');
        btnP.classList.remove('bg-slate-900', 'text-white');
        btnP.classList.add('bg-slate-50', 'text-slate-700');
      } else {
        displayTxt.classList.add('card-font');
        displayTxt.classList.remove('card-font-special');
        btnP.classList.add('bg-slate-900', 'text-white');
        btnP.classList.remove('bg-slate-50', 'text-slate-700');
        btnS.classList.remove('bg-slate-900', 'text-white');
        btnS.classList.add('bg-slate-50', 'text-slate-700');
      }
      autoFitText();
    }

    function setTheme(bg, text, border) {
      card.style.backgroundColor = bg;
      card.style.borderColor = border;
      displayTxt.style.color = text;
    }

    function setLayout(val) {
      const btnV = document.getElementById('btnV');
      const btnH = document.getElementById('btnH');

      if (val === 'H') {
        card.classList.add('horizontal');
        btnH.classList.add('active', 'bg-slate-900', 'text-white');
        btnH.classList.remove('bg-slate-50', 'text-slate-700');
        btnV.classList.remove('active', 'bg-slate-900', 'text-white');
        btnV.classList.add('bg-slate-50', 'text-slate-700');
      } else {
        card.classList.remove('horizontal');
        btnV.classList.add('active', 'bg-slate-900', 'text-white');
        btnV.classList.remove('bg-slate-50', 'text-slate-700');
        btnH.classList.remove('active', 'bg-slate-900', 'text-white');
        btnH.classList.add('bg-slate-50', 'text-slate-700');
      }

      // Re-fit text after layout change
      setTimeout(autoFitText, 350);
    }

    function randomLayout() {
      const themes = [
        ['#ffffff','#1e293b','#e2e8f0'],
        ['#fef2f2','#991b1b','#fecaca'],
        ['#f0f9ff','#075985','#bae6fd'],
        ['#1e293b','#f8fafc','#475569'],
        ['#fefce8','#854d0e','#fde68a'],
        ['#f0fdf4','#166534','#bbf7d0'],
        ['#fdf4ff','#6b21a8','#e9d5ff'],
        ['#fff7ed','#9a3412','#fed7aa'],
      ];
      const aligns = ['text-left', 'text-center', 'text-right'];
      const paddings = ['1rem', '1.5rem', '2rem', '2.5rem'];
      const radii = ['8px', '16px', '24px', '32px', '50px'];
      const borderWidths = ['4px', '6px', '8px', '10px', '12px'];

      // Pick random values — font and format (layout) are kept as currently selected
      const theme = themes[Math.floor(Math.random() * themes.length)];
      const align = aligns[Math.floor(Math.random() * aligns.length)];
      const padding = paddings[Math.floor(Math.random() * paddings.length)];
      const radius = radii[Math.floor(Math.random() * radii.length)];
      const borderW = borderWidths[Math.floor(Math.random() * borderWidths.length)];

      // Apply theme only
      setTheme(...theme);

      // Apply random style tweaks
      card.style.padding = padding;
      card.style.borderRadius = radius;
      card.style.borderWidth = borderW;

      // Apply text alignment
      displayTxt.classList.remove('text-left', 'text-center', 'text-right');
      displayTxt.classList.add(align);

      autoFitText();
    }

    function downloadImage() {
      const btn = document.querySelector('button[onclick="downloadImage()"]');
      btn.innerText = 'Generating... ⏳';
      btn.disabled = true;

      setTimeout(() => {
        html2canvas(card, {
          scale: 3,
          useCORS: true,
          logging: false,
          backgroundColor: null
        }).then(canvas => {
          const link = document.createElement('a');
          link.download = 'my-card.png';
          link.href = canvas.toDataURL('image/png');
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);

          btn.innerText = 'Download Card 📥';
          btn.disabled = false;
          statusMsg.classList.remove('hidden');
          setTimeout(() => statusMsg.classList.add('hidden'), 3000);
        }).catch(err => {
          console.error(err);
          btn.innerText = 'Download Card 📥';
          btn.disabled = false;
          alert('Kuch galat hua, dobara try karein.');
        });
      }, 100);
    }
  </script>
</body>
</html>
